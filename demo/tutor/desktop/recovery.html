<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/graduation-cap.svg" />
    <title>Learn@Home - Récupération du mot de passe | Maquette Desktop</title>

    <link rel="stylesheet" href="../../assets/css/common.css" />
    <style>
      :root {
        --primary: #3b82f6;
        --primary-dark: #1e40af;
        --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        --radius-md: 12px;
        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #3b82f6 0%, #1e40af 50%, #1e3a8a 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        background: #ffffff;
        border-radius: var(--radius-md);
        width: 100%;
        max-width: 420px;
        padding: 48px;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255, 255, 255, 0.9);
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo {
        font-size: 28px;
        font-weight: 700;
        color: #3b82f6;
        margin-bottom: 8px;
      }

      .logo-subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 24px;
        color: #111827;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #374151;
      }

      input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }

      input[type="email"]:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }

      .error-message {
        color: #dc2626;
        font-size: 12px;
        margin-top: 4px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      input:invalid:not(:placeholder-shown) {
        border-color: #dc2626;
      }

      .button-primary {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        margin-top: 24px;
        cursor: pointer;
        font-size: 16px;
        transition: var(--transition);
        box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
      }

      .button-primary:hover {
        background: var(--primary-dark);
        box-shadow: 0 4px 8px rgba(59, 130, 246, 0.35);
      }

      .button-primary:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      .button-primary:active {
        transform: scale(0.98);
      }

      .back-link {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: #6b7280;
      }

      .back-link a {
        color: #3b82f6;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      .back-link a:focus {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }

      .copyright {
        text-align: center;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
        color: #94a3b8;
        font-size: 12px;
      }

      .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        display: none;
        flex-direction: column;
        gap: 12px;
        z-index: 9999;
        pointer-events: none;
      }

      .toast-container:has(.toast) {
        display: flex;
      }

      .toast {
        background: white;
        border-radius: 8px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 16px;
        min-width: 300px;
        animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        pointer-events: auto;
      }

      .toast.dismissing {
        animation: fadeOut 0.3s ease-out forwards;
      }

      .toast-title {
        font-size: 14px;
        font-weight: 600;
        color: #111827;
        margin-bottom: 4px;
      }

      .toast-message {
        font-size: 13px;
        color: #6b7280;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }

        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }

        to {
          opacity: 0;
          transform: translateX(100px);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="logo">📚 Learn@Home</div>
        <div class="logo-subtitle">Plateforme de tutorat en ligne</div>
        <h1>Mot de passe oublié</h1>
        <p class="subtitle">Entrez votre email pour recevoir un lien de réinitialisation.</p>
      </div>

      <form id="recovery-form" onsubmit="validateRecovery(event)">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="tutor@learnhome.com" value="yann.uliong@learnhome.com" required />
        <div class="error-message" id="email-error">Veuillez entrer une adresse email valide</div>
        <button class="button-primary" type="submit">Envoyer le lien</button>
      </form>

      <p class="back-link">
        Retour à la
        <a onclick="window.location.href = 'login.html'" href="login.html">connexion</a>
      </p>

      <div class="copyright">© 2026 Learn@Home. All rights reserved.</div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script>
      const showToast = (icon, title, message) => {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<div class="toast-title">${icon} ${title}</div><div class="toast-message">${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add("dismissing");
          setTimeout(() => toast.remove(), 500);
        }, 2700);
      };

      const validateRecovery = (event) => {
        event.preventDefault();
        showToast("✉️", "Récupération", "Email de récupération envoyé avec succès");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 500);
      };
    </script>
  </body>
</html>
